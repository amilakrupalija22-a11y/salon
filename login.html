<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h2>Login / Registracija</h2>

    <input type="email" id="email" placeholder="Email"><br>
    <input type="password" id="pass" placeholder="Password"><br>

    <button onclick="register()">Registracija</button>
    <button onclick="login()">Login</button>
</div>


<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDB_s7QA6VxvKbYGVW2IbWPYXN19YdNwLM",
  authDomain: "salon-964a7.firebaseapp.com",
  projectId: "salon-964a7",
  storageBucket: "salon-964a7.firebasestorage.app",
  messagingSenderId: "1091935871033",
  appId: "1:1091935871033:web:c046651a4093416848ede8"
};


firebase.initializeApp(firebaseConfig);


function register(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("pass").value;

    firebase.auth().createUserWithEmailAndPassword(email, pass)
    .then(() => alert("Registrovan!"))
    .catch(e => alert(e.message));
}


function login(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("pass").value;

    firebase.auth().signInWithEmailAndPassword(email, pass)
    .then(() => {
        alert("Uspješan login!");
        window.location = "index.html";
    })
    .catch(e => alert(e.message));
}
</script>

</body>
</html>
